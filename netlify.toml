[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

# Proxy requests starting with /api to your production backend API.
# TODO: Replace the placeholder URL with your actual deployed backend URL (e.g., on Render, Railway, Fly.io)
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-api-url.onrender.com/api/:splat"
  status = 200
  force = true

# Route all other routes to index.html so React Router client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
